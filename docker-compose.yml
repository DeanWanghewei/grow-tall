services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data # SQLite 数据持久化
    environment:
      # 必改:会话签名密钥(任意长随机串)
      SESSION_SECRET: ${SESSION_SECRET:-please-change-this-to-a-long-random-string-32+}
      # 可选:预设访问密码(留空则首次打开 App 时引导设置)
      APP_PASSWORD: ${APP_PASSWORD:-}
      # HTTP 访问(无 HTTPS/反代)必须 false,否则登录后无法进入;HTTPS 下建议 true
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # 可选:S3 图片存储(全部留空 = 图片功能关闭,UI 显示「不可用」)
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE: ${S3_PUBLIC_BASE:-}
    restart: unless-stopped

  # 可选:本地 S3 兼容存储(MinIO),用于自托管成长照片
